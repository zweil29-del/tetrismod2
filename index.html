<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="game-left">
                <canvas id="gameBoard" width="300" height="600"></canvas>
            </div>
            <div class="game-right">
                <div class="stats-section">
                    <div class="stat-item">
                        <div class="stat-label">SCORE</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">LEVEL</div>
                        <div class="stat-value" id="level">1</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">LINES</div>
                        <div class="stat-value" id="lines">0</div>
                    </div>
                </div>

                <div class="preview-section">
                    <div class="preview-label">NEXT</div>
                    <canvas id="nextPiece" width="100" height="100"></canvas>
                </div>

                <div class="preview-section">
                    <div class="preview-label">HOLD</div>
                    <canvas id="holdPiece" width="100" height="100"></canvas>
                </div>

                <div class="controls-section">
                    <div class="controls-title">CONTROLS</div>
                    <div class="control-item">← → : Move</div>
                    <div class="control-item">↓ : Soft Drop</div>
                    <div class="control-item">SPACE : Hard Drop</div>
                    <div class="control-item">Z : Rotate CCW</div>
                    <div class="control-item">X : Rotate CW</div>
                    <div class="control-item">C : Hold</div>
                    <div class="control-item">P : Pause</div>
                </div>
            </div>
        </div>

        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-content">
                <h1>GAME OVER</h1>
                <div class="final-score">
                    <div>Score: <span id="finalScore">0</span></div>
                    <div>Level: <span id="finalLevel">1</span></div>
                    <div>Lines: <span id="finalLines">0</span></div>
                </div>
                <button id="restartBtn">RESTART</button>
            </div>
        </div>

        <div class="pause-overlay" id="pauseOverlay">
            <div class="pause-content">
                <h1>PAUSED</h1>
                <p>Press P to resume</p>
            </div>
        </div>
    </div>

    <script src="js/piece.js"></script>
    <script src="js/board.js"></script>
    <script src="js/rotation.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
